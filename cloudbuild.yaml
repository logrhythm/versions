# Google Cloud Build - Release Artifact Validation Pipeline
# Validates that all Docker images referenced in latest.yml are pullable from the registry.
#
# Triggered on: PRs and pushes to master in logrhythm/versions
# Purpose: Catch broken image references before a release is published.

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/ARTIFACTORY_USER/versions/latest
    env: 'ARTIFACTORY_USER'
  - versionName: projects/$PROJECT_ID/secrets/ARTIFACTORY_PASSWORD/versions/latest
    env: 'ARTIFACTORY_PASSWORD'

steps:

# === AUTHENTICATE WITH JFROG ARTIFACTORY ===
# Credentials are injected as env vars scoped to this step only — never written to disk.
- name: 'gcr.io/cloud-builders/docker'
  id: authenticate_artifactory
  secretEnv: ['ARTIFACTORY_USER', 'ARTIFACTORY_PASSWORD']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "$$ARTIFACTORY_PASSWORD" | docker login logrhythm-docker.jfrog.io \
        --username "$$ARTIFACTORY_USER" \
        --password-stdin

# === VALIDATE RELEASE ARTIFACTS ===
# Cloud Build runs lrversion directly as a step — /workspace and
# /var/run/docker.sock are mounted automatically.
# --url "" suppresses the default GitHub URL so only the local latest.yml
# is validated (i.e. the proposed change, not the already-published master).
- name: 'logrhythm-docker.jfrog.io/logrhythm/collection/collection-master/lrversion:${_LRVERSION_TAG}'
  id: validate_release_artifacts
  args:
    - 'validate'
    - '--file'
    - '/workspace/latest.yml'
    - '--url'
    - ''
  waitFor:
    - authenticate_artifactory

substitutions:
  _LRVERSION_TAG: '1.0.0'

timeout: 600s
